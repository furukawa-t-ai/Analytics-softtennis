<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境テスト</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0fdf4; color: #334155; }
        h1 { font-size: 1.2rem; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; }
        #log { list-style: none; padding: 0; margin-top: 20px; font-weight: bold; }
        #log li { padding: 10px; margin-bottom: 5px; border-radius: 5px; background: white; border-left: 5px solid #cbd5e1; }
        .success { border-left-color: #22c55e !important; color: #15803d; }
        .error { border-left-color: #ef4444 !important; color: #b91c1c; background: #fee2e2 !important; }
    </style>
</head>
<body>
    <h1>🔍 システム読み込みテスト</h1>
    <ul id="log"></ul>

    <script>
        function log(msg, isError = false) {
            const ul = document.getElementById('log');
            const li = document.createElement('li');
            li.textContent = msg;
            if (isError) li.className = 'error';
            else li.className = 'success';
            ul.appendChild(li);
        }
        
        // エラー監視
        window.onerror = function(msg, url, line) {
            log("❌ [異常検知] " + msg + " (行:" + line + ")", true);
        };
    </script>

    <!-- 1. CSSの読み込みテスト -->
    <script src="https://cdn.tailwindcss.com" onload="log('✅ Tailwind CSS: 成功')" onerror="log('❌ Tailwind CSS: 失敗', true)"></script>

    <!-- 2. Reactの読み込みテスト -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" onload="log('✅ React 本体: 成功')" onerror="log('❌ React 本体: 失敗 (これが原因の可能性大)', true)"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onload="log('✅ React DOM: 成功')" onerror="log('❌ React DOM: 失敗', true)"></script>

    <!-- 3. Babelの読み込みテスト -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" onload="log('✅ Babel 翻訳機能: 成功')" onerror="log('❌ Babel 翻訳機能: 失敗', true)"></script>

    <!-- 4. Firebaseの読み込みテスト -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js" onload="log('✅ Firebase 本体: 成功')" onerror="log('❌ Firebase 本体: 失敗 (これが原因の可能性大)', true)"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js" onload="log('✅ Firebase データベース: 成功')" onerror="log('❌ Firebase データベース: 失敗', true)"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js" onload="log('✅ Firebase 認証: 成功')" onerror="log('❌ Firebase 認証: 失敗', true)"></script>

    <!-- 5. 初期化テスト -->
    <script>

                    log('❌ Firebaseが認識されていません。', true);
                }

                if (typeof React !== 'undefined') {
                    log('✅ Reactの動作準備が完了しました！');

                    log('❌ Reactが認識されていません。', true);

                log('🎉 テスト完了。スクショをお願いします！');

</body>
