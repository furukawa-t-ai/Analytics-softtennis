<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ST-ANALYTICS | 動作テスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // どんなエラーも絶対に画面に出すための最強の監視
        window.addEventListener('error', function(e) {
            document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;font-weight:bold;">【システムエラー】<br>' + (e.message || 'Script error') + '</div>';
        });
        window.addEventListener('unhandledrejection', function(e) {
            document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;font-weight:bold;">【通信エラー】<br>' + (e.reason ? e.reason.message : 'Unknown error') + '</div>';
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root">
        <div style="text-align: center; padding: 50px; font-weight: bold; color: #64748b;">
            システムを起動中...
        </div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

            // Reactの描画テスト
            const e = React.createElement;
            function App() {
