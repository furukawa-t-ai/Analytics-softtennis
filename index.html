    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- DB shim: ensure window.DB.saveMatch exists ---
        window.DB = window.DB || {};

        /**
         * Save a match object.
         * - If Firestore is available, save to the 'matches' collection.
         * - Otherwise fallback to localStorage so the UI still works offline / without Firestore write permissions.
         * @param {Object} matchObj - serializable match object
         * @returns {Promise<string>} id of saved doc (Firestore id or local id)
         */
        window.DB.saveMatch = window.DB.saveMatch || (async function(matchObj) {
          try {
            // Try Firestore first (imports are available in module scope)
            if (typeof getFirestore === 'function' && typeof addDoc === 'function' && typeof collection === 'function') {
              try {
                const db = getFirestore();
                const col = collection(db, 'matches');
                const docRef = await addDoc(col, {
                  ...matchObj,
                  createdAt: (new Date()).toISOString()
                });
                console.log('DB.saveMatch: saved to Firestore id=', docRef.id);
                return docRef.id;
              } catch (err) {
                console.warn('DB.saveMatch: Firestore write failed, falling back to localStorage', err);
                // fallthrough to local fallback
              }
            }

            // Local fallback
            const key = 'matches_fallback_v1';
            const raw = localStorage.getItem(key);
            const arr = raw ? JSON.parse(raw) : [];
            const id = 'local_' + Date.now() + '_' + Math.floor(Math.random()*1000);
            const payload = {
              id,
              fallback: true,
              createdAt: (new Date()).toISOString(),
              ...matchObj
            };
            arr.push(payload);
            localStorage.setItem(key, JSON.stringify(arr));
            console.log('DB.saveMatch: saved to localStorage id=', id);
            return id;
          } catch (e) {
            console.error('DB.saveMatch: unexpected error', e);
            throw e;
          }
        });
