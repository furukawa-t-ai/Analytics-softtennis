<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ST-ANALYTICS | プロ仕様分析ツール</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    <script>
        window.addEventListener('error', function(e) {
            var root = document.getElementById('root');
            if(root) root.innerHTML = '<div style="padding:20px;color:#b91c1c;font-weight:bold;background:#fee2e2;">【システムエラー】<br>' + (e.message || 'Script error') + '</div>';
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 font-sans">
    <div id="root">
        <div style="text-align: center; padding: 50px; font-weight: bold; color: #64748b;">
            システムを起動中...<br><br>
            <span style="font-size: 12px; color: #94a3b8;">※数秒しても進まない場合はリロードしてください</span>
        </div>
    </div>

    <!-- 1. React (Babelは使わず、純粋なJSで動かします) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 2. メインプログラム (Firebase v12.12.1 のモジュールとして実行) -->
    <script type="module">
        // ご提示いただいたFirebase v12.12.1のモジュールをインポート
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // --- Firebase 初期化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCP4fUJBAKU7TaZ8jIRWxHzRMLLoE_T-wE",
            authDomain: "softtennis-data.firebaseapp.com",
            projectId: "softtennis-data",
            storageBucket: "softtennis-data.firebasestorage.app",
            messagingSenderId: "1082808525053",
            appId: "1:1082808525053:web:76ad357138a2b81a9a1e94",
            measurementId: "G-N9EYK4ZNSR"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "soft-tennis-v1";

        // Reactショートカット
        const e = React.createElement;
        const { useState, useEffect, useMemo } = React;

        // --- 手作りSVGアイコン ---
        const I_Act = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-6 h-6 text-yellow-400"}, e('polyline', {points:"22 12 18 12 15 21 9 3 6 12 2 12"}));
        const I_Plus = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-6 h-6"}, e('circle', {cx:"12", cy:"12", r:"10"}), e('line', {x1:"12",y1:"8",x2:"12",y2:"16"}), e('line', {x1:"8",y1:"12",x2:"16",y2:"12"}));
        const I_User = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-6 h-6"}, e('path', {d:"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"}), e('circle', {cx:"12", cy:"7", r:"4"}));
        const I_Users = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-6 h-6"}, e('path', {d:"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"}), e('circle', {cx:"9", cy:"7", r:"4"}), e('path', {d:"M22 21v-2a4 4 0 0 0-3-3.87"}), e('path', {d:"M16 3.13a4 4 0 0 1 0 7.75"}));
        const I_Undo = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-3 h-3"}, e('path', {d:"M3 7v6h6"}), e('path', {d:"M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"}));
        const I_Award = (props) => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:`w-${props.w||"4"} h-${props.h||"4"} mx-auto`}, e('circle', {cx:"12",cy:"8",r:"7"}), e('polyline', {points:"8.21 13.89 7 23 12 20 17 23 15.79 13.88"}));
        const I_Target = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-4 h-4"}, e('circle', {cx:"12",cy:"12",r:"10"}), e('circle', {cx:"12",cy:"12",r:"6"}), e('circle', {cx:"12",cy:"12",r:"2"}));
        const I_Zap = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-4 h-4"}, e('polygon', {points:"13 2 3 14 12 14 11 22 21 10 12 10 13 2"}));
        const I_Check = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-4 h-4"}, e('path', {d:"M22 11.08V12a10 10 0 1 1-5.93-9.14"}), e('polyline', {points:"22 4 12 14.01 9 11.01"}));
        const I_Alert = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-4 h-4"}, e('path', {d:"m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"}), e('line', {x1:"12",y1:"9",x2:"12",y2:"13"}), e('line', {x1:"12",y1:"17",x2:"12.01",y2:"17"}));
        const I_DL = () => e('svg', {viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round", className:"w-3 h-3"}, e('path', {d:"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"}), e('polyline', {points:"7 10 12 15 17 10"}), e('line', {x1:"12",y1:"15",x2:"12",y2:"3"}));

        // --- データ定義 ---
        const PT = [
            { id: 'FP', label: 'FP' }, { id: 'BP', label: 'BP' }, { id: 'FV', label: 'FV' }, { id: 'BV', label: 'BV' },
            { id: 'FR', label: 'FR' }, { id: 'BR', label: 'BR' }, { id: 'SM', label: 'SM' }, { id: 'SA', label: 'SA' },
            { id: 'FL', label: 'FL' }, { id: 'BL', label: 'BL' }
        ];
        const MT = [
            { id: 'FPN', label: 'FPN', g: 'ネット' }, { id: 'BPN', label: 'BPN', g: 'ネット' }, { id: 'FVN', label: 'FVN', g: 'ネット' }, { id: 'BVN', label: 'BVN', g: 'ネット' },
            { id: 'SMN', label: 'SMN', g: 'ネット' }, { id: 'FPB', label: 'FPB', g: 'バック' }, { id: 'BPB', label: 'BPB', g: 'バック' }, { id: 'FVB', label: 'FVB', g: 'バック' },
            { id: 'BVB', label: 'BVB', g: 'バック' }, { id: 'SMB', label: 'SMB', g: 'バック' }, { id: 'FPS', label: 'FPS', g: 'サイド' }, { id: 'BPS', label: 'BPS', g: 'サイド' },
            { id: 'FVS', label: 'FVS', g: 'サイド' }, { id: 'BVS', label: 'BVS', g: 'サイド' }, { id: 'SMS', label: 'SMS', g: 'サイド' }, { id: 'W', label: 'W', g: 'その他' }
        ];
        const MG = ['ネット', 'バック', 'サイド', 'その他'];

        const SvgArrow = function(props) {
            const colorClass = props.isAct ? 'text-blue-600' : 'text-slate-400';
            return e('svg', { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "3", strokeLinecap: "round", strokeLinejoin: "round", className: "w-8 h-8 mb-2 mx-auto " + colorClass }, [
                e('line', { key: 1, x1: props.p[0], y1: props.p[1], x2: props.p[2], y2: props.p[3] }), 
                e('polyline', { key: 2, points: props.p[4] })
            ]);
        };

        const FMS = [
            { id: 'cross_left', label: '正クロス', icon: function(act) { return e(SvgArrow, { p: ["17","17","7","7","7 17 7 7 17 7"], isAct: act }); } },
            { id: 'straight', label: 'ストレート', icon: function(act) { return e(SvgArrow, { p: ["12","19","12","5","5 12 12 5 19 12"], isAct: act }); } },
            { id: 'cross_right', label: '逆クロス', icon: function(act) { return e(SvgArrow, { p: ["7","17","17","7","7 7 17 7 17 17"], isAct: act }); } }
        ];

        // --- メインアプリ ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('input');
            const [matches, setMatches] = useState([]);

            useEffect(function() {
                const unsub = onAuthStateChanged(auth, function(u) {
                    if (u) setUser(u);
                    else signInAnonymously(auth).catch(console.error);
                });
                return function() { unsub(); };
            }, []);

            useEffect(function() {
                if (!user) return;
                // v12 Module構文でのFirestoreリスナー
                const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'matches'));
                const unsub = onSnapshot(q, function(snap) {
                    const dataArray = snap.docs.map(function(doc) { return Object.assign({ id: doc.id }, doc.data()); });
                    dataArray.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
                    setMatches(dataArray);
                }, function(err) { console.error("DB Error", err); });
                return function() { unsub(); };
            }, [user]);

            return e('div', { className: 'min-h-screen pb-20' }, [
                e('header', { key: 'head', className: 'bg-blue-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg' }, [
                    e('div', { key: 'logo', className: 'flex items-center gap-2' }, [
                        e(I_Act, { key: 'i' }),
                        e('h1', { key: 't', className: 'text-xl font-black italic tracking-tighter' }, 'ST-ANALYTICS')
                    ]),
                    user ? e('span', { key: 'uid', className: 'text-[8px] opacity-40 font-mono' }, user.uid.substring(0,8)) : null
                ]),

                e('main', { key: 'main', className: 'max-w-4xl mx-auto p-4' }, [
                    view === 'input' ? e(InputSection, { key: 'v1', user: user }) : null,
                    view === 'player' ? e(PlayerDash, { key: 'v2', matches: matches }) : null,
                    view === 'team' ? e(TeamDash, { key: 'v3', matches: matches }) : null
                ]),

                e('nav', { key: 'nav', className: 'fixed bottom-0 left-0 right-0 bg-white border-t p-2 pb-6 flex justify-around shadow-2xl z-50' }, [
                    { id: 'input', icon: I_Plus, label: '入力' },
                    { id: 'player', icon: I_User, label: '個人' },
                    { id: 'team', icon: I_Users, label: 'チーム' }
                ].map(function(item) {
                    return e('button', { key: item.id, onClick: function() { setView(item.id); }, className: "flex flex-col items-center p-2 rounded-xl transition-all " + (view === item.id ? 'text-blue-600 bg-blue-50 scale-105' : 'text-slate-400') }, [
                        e(item.icon, { key: 'i' }),
                        e('span', { key: 'l', className: 'text-[10px] mt-1 font-bold' }, item.label)
                    ]);
                }))
            ]);
        }

        // --- 入力セクション ---
        function InputSection(props) {
            const user = props.user;
            const [step, setStep] = useState('meta');
            const [mi, setMi] = useState({ type: 'doubles', gc: 7, t: '', p1: '', p2: '', opp: '', pts: [] });
            const [sc, setSc] = useState({ p1: 0, p2: 0, g1: 0, g2: 0 });
            const [st, setSt] = useState(null);
            const [fm, setFm] = useState(null);
            const [his, setHis] = useState([]);
            const [isUsSrv, setIsUsSrv] = useState(true);

            // ファイナルゲーム判定
            const isFinalGame = (sc.g1 + sc.g2 === mi.gc - 1);

            const rec = function(wSide, sLbl, type, code) {
                setHis([...his, { mi: JSON.parse(JSON.stringify(mi)), sc: Object.assign({}, sc), isUsSrv: isUsSrv }]);
                const newPt = { winnerSide: wSide, sideLabel: sLbl, type: type, code: code, serveStatus: st, formation: fm, gameIndex: sc.g1+sc.g2, isOurServe: isUsSrv };
                const newMi = Object.assign({}, mi, { pts: [...mi.pts, newPt] });
                
                let p1 = sc.p1; let p2 = sc.p2; let g1 = sc.g1; let g2 = sc.g2;
                if (wSide === 1) p1++; else p2++;

                let gameWonBy = 0; // 0:継続, 1:自チーム, 2:相手

                // ファイナルゲームと通常ゲームのルール対応
                if (isFinalGame) {
                    if (p1 >= 7 && p1 - p2 >= 2) gameWonBy = 1;
                    else if (p2 >= 7 && p2 - p1 >= 2) gameWonBy = 2;

                    if ((p1 + p2) % 2 === 1) setIsUsSrv(!isUsSrv);
                } else {
                    if (p1 >= 4 && p1 - p2 >= 2) gameWonBy = 1;
                    else if (p2 >= 4 && p2 - p1 >= 2) gameWonBy = 2;
                }

                if (gameWonBy !== 0) {
                    if (gameWonBy === 1) g1++; else g2++;
                    p1 = 0; p2 = 0;
                    if (!isFinalGame) setIsUsSrv(!isUsSrv);
                }

                setMi(newMi); setSc({ p1: p1, p2: p2, g1: g1, g2: g2 }); setSt(null); setFm(null);
                
                if (g1 >= Math.ceil(mi.gc/2) || g2 >= Math.ceil(mi.gc/2)) setStep('sum');
            };

            const undo = function() {
                if (his.length === 0) return;
                const l = his[his.length-1]; 
                setMi(l.mi); setSc(l.sc); setIsUsSrv(l.isUsSrv); setHis(his.slice(0,-1));
            };

            if (step === 'meta') {
                return e('div', { className: 'bg-white p-6 rounded-2xl shadow-sm border space-y-6' }, [
                    e('h2', { key: 'h', className: 'text-xl font-bold border-b pb-2' }, '試合設定'),
                    e('div', { key: 'f', className: 'space-y-4' }, [
                        e('div', { key: 'f1' }, [
                            e('label', { className: 'text-[10px] font-bold text-slate-400 block mb-1 uppercase' }, '種目'),
                            e('div', { className: 'flex gap-2' }, [{id:'doubles',l:'ダブルス'},{id:'singles',l:'シングルス'}].map(function(t) {
                                return e('button', { key: t.id, onClick: function() { setMi(Object.assign({}, mi, {type: t.id})); }, className: "flex-1 py-3 rounded-xl border-2 font-bold " + (mi.type === t.id ? 'border-blue-600 bg-blue-50 text-blue-700' : 'text-slate-400') }, t.l);
                            }))
                        ]),
                        e('div', { key: 'f2' }, [
                            e('label', { className: 'text-[10px] font-bold text-slate-400 block mb-1 uppercase' }, 'ゲーム数'),
                            e('div', { className: 'flex gap-2' }, [5,7,9].map(function(n) {
                                return e('button', { key: n, onClick: function() { setMi(Object.assign({}, mi, {gc: n})); }, className: "flex-1 py-3 rounded-xl border-2 font-bold " + (mi.gc === n ? 'border-blue-600 bg-blue-50 text-blue-700' : 'text-slate-400') }, n + '回戦');
                            }))
                        ]),
                        e('input', { key: 'i1', className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '大会名', value: mi.t, onChange: function(ev) { setMi(Object.assign({}, mi, {t: ev.target.value})); } }),
                        e('div', { key: 'g1', className: 'grid grid-cols-2 gap-2' }, [
                            e('input', { key: 'i2', className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '自チーム選手1', value: mi.p1, onChange: function(ev) { setMi(Object.assign({}, mi, {p1: ev.target.value})); } }),
                            mi.type === 'doubles' ? e('input', { key: 'i3', className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '自チーム選手2', value: mi.p2, onChange: function(ev) { setMi(Object.assign({}, mi, {p2: ev.target.value})); } }) : null
                        ]),
                        e('input', { key: 'i4', className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold text-red-600', placeholder: '相手チーム名', value: mi.opp, onChange: function(ev) { setMi(Object.assign({}, mi, {opp: ev.target.value})); } })
                    ]),
                    e('button', { key: 'b', onClick: function() { (mi.p1 && mi.opp) ? setStep('rec') : alert('選手名と相手チームを入力してください'); }, className: 'w-full bg-blue-700 text-white p-5 rounded-2xl font-black text-lg active:scale-95 transition-transform' }, '試合開始')
                ]);
            }

            if (step === 'rec') {
                return e('div', { className: 'space-y-4' }, [
                    e('div', { key: 'scb', className: "bg-slate-900 text-white p-6 rounded-3xl shadow-xl flex justify-between relative items-stretch " + (isFinalGame ? 'border-4 border-yellow-500 shadow-yellow-500/30' : '') }, [
                        isFinalGame 
                            ? e('div', { key: 'fin', className: 'absolute -top-4 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-yellow-500 to-orange-500 text-white px-4 py-1 rounded-full text-[10px] font-black shadow-lg z-10 whitespace-nowrap tracking-widest border border-white' }, '🔥 FINAL GAME 🔥')
                            : e('div', { key: 'msg', className: 'absolute -top-3 left-1/2 transform -translate-x-1/2 bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[9px] font-bold shadow-sm z-10 whitespace-nowrap' }, '※🎾をタップでサーブ変更'),
                        e('div', { key: 'us', className: 'text-center flex-1 flex flex-col justify-between relative', onClick: function() { setIsUsSrv(true); } }, [
                            isUsSrv ? e('div', { key: 'ball', className: 'absolute -top-2 left-0 text-3xl animate-bounce drop-shadow-md' }, '🎾') : null,
                            e('div', { key: 'n', className: 'mb-3' }, [ e('div', { key: 'l', className: 'text-[10px] text-blue-400 font-black uppercase' }, 'OURS'), e('div', { key: 'v', className: 'text-xl font-black leading-tight' }, mi.p1 + (mi.p2?' / '+mi.p2:'')) ]),
                            e('div', { key: 'g', className: 'text-6xl font-black mb-1' }, sc.g1),
                            e('div', { key: 'p', className: 'inline-block self-center px-6 py-1 bg-blue-600 rounded-full text-lg font-black' }, sc.p1)
                        ]),
                        e('div', { key: 'line', className: 'flex items-center px-4' }, e('div', { className: 'h-24 w-px bg-slate-700' })),
                        e('div', { key: 'opp', className: 'text-center flex-1 flex flex-col justify-between relative', onClick: function() { setIsUsSrv(false); } }, [
                            !isUsSrv ? e('div', { key: 'ball', className: 'absolute -top-2 right-0 text-3xl animate-bounce drop-shadow-md' }, '🎾') : null,
                            e('div', { key: 'n', className: 'mb-3' }, [ e('div', { key: 'l', className: 'text-[10px] text-red-400 font-black uppercase' }, 'OPP'), e('div', { key: 'v', className: 'text-xl font-black leading-tight' }, mi.opp) ]),
                            e('div', { key: 'g', className: 'text-6xl font-black mb-1' }, sc.g2),
                            e('div', { key: 'p', className: 'inline-block self-center px-6 py-1 bg-red-600 rounded-full text-lg font-black' }, sc.p2)
                        ])
