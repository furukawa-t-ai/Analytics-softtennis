<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ST-ANALYTICS | プロ仕様分析ツール</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .stat-card { transition: transform 0.2s; }
        .stat-card:active { transform: scale(0.98); }
        .direction-btn { transition: all 0.2s; }
        .direction-btn.active { background-color: #eff6ff; border-color: #2563eb; color: #1e40af; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>

    <script>
        window.addEventListener('error', function(e) {
            document.getElementById('root').innerHTML = '<div style="padding:20px;color:#b91c1c;font-weight:bold;background:#fee2e2;">【システムエラー】<br>' + (e.message || 'Script error') + '</div>';
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 font-sans">
    <div id="root">
        <div style="text-align: center; padding: 50px; font-weight: bold; color: #64748b;">
            システムを起動中...
        </div>
    </div>

    <!-- 1. React (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 2. Firebase v10 Compat (モダンかつ安定) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>

    <!-- 3. メインプログラム (純粋なJavaScript・Babel不要) -->
    <script>
        // --- Firebase 初期化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCP4fUJBAKU7TaZ8jIRWxHzRMLLoE_T-wE",
            authDomain: "softtennis-data.firebaseapp.com",
            projectId: "softtennis-data",
            storageBucket: "softtennis-data.firebasestorage.app",
            messagingSenderId: "1082808525053",
            appId: "1:1082808525053:web:76ad357138a2b81a9a1e94"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const APP_ID = "soft-tennis-v1";

        // Reactショートカット
        const el = React.createElement;
        const { useState, useEffect, useMemo } = React;

        // --- データ定義 ---
        const PT = [
            { id: 'FP', label: 'FP' }, { id: 'BP', label: 'BP' }, { id: 'FV', label: 'FV' }, { id: 'BV', label: 'BV' },
            { id: 'FR', label: 'FR' }, { id: 'BR', label: 'BR' }, { id: 'SM', label: 'SM' }, { id: 'SA', label: 'SA' },
            { id: 'FL', label: 'FL' }, { id: 'BL', label: 'BL' }
        ];
        const MT = [
            { id: 'FPN', label: 'FPN', g: 'ネット' }, { id: 'BPN', label: 'BPN', g: 'ネット' }, { id: 'FVN', label: 'FVN', g: 'ネット' }, { id: 'BVN', label: 'BVN', g: 'ネット' },
            { id: 'SMN', label: 'SMN', g: 'ネット' }, { id: 'FPB', label: 'FPB', g: 'バック' }, { id: 'BPB', label: 'BPB', g: 'バック' }, { id: 'FVB', label: 'FVB', g: 'バック' },
            { id: 'BVB', label: 'BVB', g: 'バック' }, { id: 'SMB', label: 'SMB', g: 'バック' }, { id: 'FPS', label: 'FPS', g: 'サイド' }, { id: 'BPS', label: 'BPS', g: 'サイド' },
            { id: 'FVS', label: 'FVS', g: 'サイド' }, { id: 'BVS', label: 'BVS', g: 'サイド' }, { id: 'SMS', label: 'SMS', g: 'サイド' }, { id: 'W', label: 'W', g: 'その他' }
        ];
        const MG = ['ネット', 'バック', 'サイド', 'その他'];

        // --- アイコンコンポーネント ---
        const SvgArrow = function(props) {
            const colorClass = props.isAct ? 'text-blue-600' : 'text-slate-400';
            return el('svg', { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "3", strokeLinecap: "round", strokeLinejoin: "round", className: "w-8 h-8 mb-2 mx-auto " + colorClass }, [
                el('line', { key: 1, x1: props.p[0], y1: props.p[1], x2: props.p[2], y2: props.p[3] }), 
                el('polyline', { key: 2, points: props.p[4] })
            ]);
        };

        const FMS = [
            { id: 'cross_left', label: '正クロス', icon: function(act) { return el(SvgArrow, { p: ["17","17","7","7","7 17 7 7 17 7"], isAct: act }); } },
            { id: 'straight', label: 'ストレート', icon: function(act) { return el(SvgArrow, { p: ["12","19","12","5","5 12 12 5 19 12"], isAct: act }); } },
            { id: 'cross_right', label: '逆クロス', icon: function(act) { return el(SvgArrow, { p: ["7","17","17","7","7 7 17 7 17 17"], isAct: act }); } }
        ];

        // --- メインアプリ ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('input');
            const [matches, setMatches] = useState([]);

            useEffect(function() {
                const unsub = auth.onAuthStateChanged(function(u) {
                    if (u) setUser(u);
                    else auth.signInAnonymously().catch(console.error);
                });
                return function() { unsub(); };
            }, []);

            useEffect(function() {
                if (!user) return;
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('matches');
                const unsub = ref.onSnapshot(function(snap) {
                    const dataArray = snap.docs.map(function(doc) { return Object.assign({ id: doc.id }, doc.data()); });
                    dataArray.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
                    setMatches(dataArray);
                }, function(err) { console.error("DB Error", err); });
                return function() { unsub(); };
            }, [user]);

            return el('div', { className: 'min-h-screen pb-20' }, [
                el('header', { key: 'head', className: 'bg-blue-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg' }, [
                    el('div', { key: 'logo', className: 'flex items-center gap-2' }, [
                        el('span', { key: 'i', className: 'text-xl' }, '📊'),
                        el('h1', { key: 't', className: 'text-xl font-black italic tracking-tighter' }, 'ST-ANALYTICS')
                    ]),
                    user ? el('span', { key: 'uid', className: 'text-[8px] opacity-40 font-mono' }, user.uid.substring(0,8)) : null
                ]),

                el('main', { key: 'main', className: 'max-w-4xl mx-auto p-4' }, [
                    view === 'input' ? el(InputSection, { key: 'v1', user: user }) : null,
                    view === 'player' ? el(PlayerDash, { key: 'v2', matches: matches }) : null,
                    view === 'team' ? el(TeamDash, { key: 'v3', matches: matches }) : null
                ]),

                el('nav', { key: 'nav', className: 'fixed bottom-0 left-0 right-0 bg-white border-t p-2 pb-6 flex justify-around shadow-2xl z-50' }, [
                    { id: 'input', icon: '➕', label: '入力' },
                    { id: 'player', icon: '👤', label: '個人' },
                    { id: 'team', icon: '👥', label: 'チーム' }
                ].map(function(item) {
                    return el('button', { key: item.id, onClick: function() { setView(item.id); }, className: "flex flex-col items-center p-2 rounded-xl transition-all " + (view === item.id ? 'text-blue-600 bg-blue-50 scale-105' : 'text-slate-400') }, [
                        el('span', { key: 'i', className: 'text-2xl' }, item.icon),
                        el('span', { key: 'l', className: 'text-[10px] mt-1 font-bold' }, item.label)
                    ]);
                }))
            ]);
        }

        // --- 入力セクション ---
        function InputSection(props) {
            const user = props.user;
            const [step, setStep] = useState('meta');
            const [mi, setMi] = useState({ type: 'doubles', gc: 7, t: '', p1: '', p2: '', opp: '', pts: [] });
            const [sc, setSc] = useState({ p1: 0, p2: 0, g1: 0, g2: 0 });
            const [st, setSt] = useState(null);
            const [fm, setFm] = useState(null);
            const [his, setHis] = useState([]);
            const [isUsSrv, setIsUsSrv] = useState(true);

            // ★ファイナルゲーム判定★
            const isFinalGame = (sc.g1 + sc.g2 === mi.gc - 1);

            const rec = function(wSide, sLbl, type, code) {
                setHis([...his, { mi: JSON.parse(JSON.stringify(mi)), sc: Object.assign({}, sc), isUsSrv: isUsSrv }]);
                const newPt = { winnerSide: wSide, sideLabel: sLbl, type: type, code: code, serveStatus: st, formation: fm, gameIndex: sc.g1+sc.g2, isOurServe: isUsSrv };
                const newMi = Object.assign({}, mi, { pts: [...mi.pts, newPt] });
                
                let p1 = sc.p1; let p2 = sc.p2; let g1 = sc.g1; let g2 = sc.g2;
                if (wSide === 1) p1++; else p2++;

                let gameWonBy = 0; // 0: 継続, 1: 自チーム勝利, 2: 相手勝利

                // ★スコア計算ロジック（ファイナルゲーム考慮）★
                if (isFinalGame) {
                    if (p1 >= 7 && p1 - p2 >= 2) gameWonBy = 1;
                    else if (p2 >= 7 && p2 - p1 >= 2) gameWonBy = 2;

                    // ファイナルのサーブ権交代 (1本目終了後、以降2本ごと)
                    if ((p1 + p2) % 2 === 1) {
                        setIsUsSrv(!isUsSrv);
                    }
                } else {
                    if (p1 >= 4 && p1 - p2 >= 2) gameWonBy = 1;
                    else if (p2 >= 4 && p2 - p1 >= 2) gameWonBy = 2;
                }

                if (gameWonBy !== 0) {
                    if (gameWonBy === 1) g1++; else g2++;
                    p1 = 0; p2 = 0;
                    if (!isFinalGame) {
                        // 通常ゲーム終了時はサーブ権交代
                        setIsUsSrv(!isUsSrv);
                    }
                }

                setMi(newMi); setSc({ p1: p1, p2: p2, g1: g1, g2: g2 }); setSt(null); setFm(null);
                
                if (g1 >= Math.ceil(mi.gc/2) || g2 >= Math.ceil(mi.gc/2)) setStep('sum');
            };

            const undo = function() {
                if (his.length === 0) return;
                const l = his[his.length-1]; 
                setMi(l.mi); setSc(l.sc); setIsUsSrv(l.isUsSrv); setHis(his.slice(0,-1));
            };

            if (step === 'meta') {
                return el('div', { className: 'bg-white p-6 rounded-2xl shadow-sm border space-y-6' }, [
                    el('h2', { key: 'h', className: 'text-xl font-bold border-b pb-2' }, '試合設定'),
                    el('div', { key: 'f', className: 'space-y-4' }, [
                        el('div', { key: 'f1' }, [
                            el('label', { className: 'text-[10px] font-bold text-slate-400 block mb-1 uppercase' }, '種目'),
                            el('div', { className: 'flex gap-2' }, [{id:'doubles',l:'ダブルス'},{id:'singles',l:'シングルス'}].map(function(t) {
                                return el('button', { key: t.id, onClick: function() { setMi(Object.assign({}, mi, {type: t.id})); }, className: "flex-1 py-3 rounded-xl border-2 font-bold " + (mi.type === t.id ? 'border-blue-600 bg-blue-50 text-blue-700' : 'text-slate-400') }, t.l);
                            }))
                        ]),
                        el('div', { key: 'f2' }, [
                            el('label', { className: 'text-[10px] font-bold text-slate-400 block mb-1 uppercase' }, 'ゲーム数'),
                            el('div', { className: 'flex gap-2' }, [5,7,9].map(function(n) {
                                return el('button', { key: n, onClick: function() { setMi(Object.assign({}, mi, {gc: n})); }, className: "flex-1 py-3 rounded-xl border-2 font-bold " + (mi.gc === n ? 'border-blue-600 bg-blue-50 text-blue-700' : 'text-slate-400') }, n + '回戦');
                            }))
                        ]),
                        el('input', { key: 'i1', className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '大会名', value: mi.t, onChange: function(ev) { setMi(Object.assign({}, mi, {t: ev.target.value})); } }),
                        el('div', { key: 'g1', className: 'grid grid-cols-2 gap-2' }, [
                            el('input', { key: 'i2', className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '自チーム選手1', value: mi.p1, onChange: function(ev) { setMi(Object.assign({}, mi, {p1: ev.target.value})); } }),
                            mi.type === 'doubles' ? el('input', { key: 'i3', className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '自チーム選手2', value: mi.p2, onChange: function(ev) { setMi(Object.assign({}, mi, {p2: ev.target.value})); } }) : null
                        ]),
                        el('input', { key: 'i4', className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold text-red-600', placeholder: '相手チーム名', value: mi.opp, onChange: function(ev) { setMi(Object.assign({}, mi, {opp: ev.target.value})); } })
                    ]),
                    el('button', { key: 'b', onClick: function() { (mi.p1 && mi.opp) ? setStep('rec') : alert('選手名と相手チームを入力してください'); }, className: 'w-full bg-blue-700 text-white p-5 rounded-2xl font-black text-lg active:scale-95 transition-transform' }, '試合開始')
                ]);
            }

            if (step === 'rec') {
                return el('div', { className: 'space-y-4' }, [
                    el('div', { key: 'scb', className: "bg-slate-900 text-white p-6 rounded-3xl shadow-xl flex justify-between relative items-stretch " + (isFinalGame ? 'border-4 border-yellow-500 shadow-yellow-500/30' : '') }, [
                        isFinalGame 
                            ? el('div', { key: 'fin', className: 'absolute -top-4 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-yellow-500 to-orange-500 text-white px-4 py-1 rounded-full text-[10px] font-black shadow-lg z-10 whitespace-nowrap tracking-widest border border-white' }, '🔥 FINAL GAME 🔥')
                            : el('div', { key: 'msg', className: 'absolute -top-3 left-1/2 transform -translate-x-1/2 bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[9px] font-bold shadow-sm z-10 whitespace-nowrap' }, '※🎾をタップでサーブ変更'),
                        el('div', { key: 'us', className: 'text-center flex-1 flex flex-col justify-between relative', onClick: function() { setIsUsSrv(true); } }, [
                            isUsSrv ? el('div', { key: 'ball', className: 'absolute -top-2 left-0 text-3xl animate-bounce drop-shadow-md' }, '🎾') : null,
                            el('div', { key: 'n', className: 'mb-3' }, [ el('div', { key: 'l', className: 'text-[10px] text-blue-400 font-black uppercase' }, 'OURS'), el('div', { key: 'v', className: 'text-xl font-black leading-tight' }, mi.p1 + (mi.p2?' / '+mi.p2:'')) ]),
                            el('div', { key: 'g', className: 'text-6xl font-black mb-1' }, sc.g1),
                            el('div', { key: 'p', className: 'inline-block self-center px-6 py-1 bg-blue-600 rounded-full text-lg font-black' }, sc.p1)
                        ]),
                        el('div', { key: 'line', className: 'flex items-center px-4' }, el('div', { className: 'h-24 w-px bg-slate-700' })),
                        el('div', { key: 'opp', className: 'text-center flex-1 flex flex-col justify-between relative', onClick: function() { setIsUsSrv(false); } }, [
                            !isUsSrv ? el('div', { key: 'ball', className: 'absolute -top-2 right-0 text-3xl animate-bounce drop-shadow-md' }, '🎾') : null,
                            el('div', { key: 'n', className: 'mb-3' }, [ el('div', { key: 'l', className: 'text-[10px] text-red-400 font-black uppercase' }, 'OPP'), el('div', { key: 'v', className: 'text-xl font-black leading-tight' }, mi.opp) ]),
                            el('div', { key: 'g', className: 'text-6xl font-black mb-1' }, sc.g2),
                            el('div', { key: 'p', className: 'inline-block self-center px-6 py-1 bg-red-600 rounded-full text-lg font-black' }, sc.p2)
                        ])
                    ]),
                    
                    el('div', { key: 'undo', className: 'flex justify-center' }, 
                        e('button', { onClick: undo, disabled: his.length===0, className: 'flex items-center gap-2 bg-slate-200 text-slate-600 px-5 py-2 rounded-full text-xs font-black disabled:opacity-30 active:scale-95 transition-transform' }, '↩️ 訂正（1手戻る）')
                    ),
                    
                    el('div', { key: 'opts', className: 'grid grid-cols-2 gap-3' }, [
                        el('div', { key: 'srv', className: 'bg-white p-3 rounded-2xl border shadow-sm' }, [
                            el('label', { className: 'text-[10px] font-black text-slate-400 block mb-2' }, '1. サーブ'),
                            el('div', { className: 'flex gap-2 h-24' }, [1,2].map(function(s) {
                                return el('button', { key: s, onClick: function() { setSt(s); }, className: "flex-1 rounded-xl border-2 font-black text-2xl " + (st===s?'border-blue-600 bg-blue-50 text-blue-700':'text-slate-300') }, s + 'st');
                            }))
                        ]),
                        el('div', { key: 'fm', className: 'bg-white p-3 rounded-2xl border shadow-sm' }, [
                            el('label', { className: 'text-[10px] font-black text-slate-400 block mb-2' }, '2. 展開'),
                            el('div', { className: 'flex gap-2 h-24' }, FMS.map(function(f) {
                                return el('button', { key: f.id, onClick: function() { setFm(f.id); }, className: "direction-btn flex-1 rounded-xl border-2 flex flex-col items-center justify-center " + (fm===f.id?'active border-blue-600 bg-blue-50 text-blue-700':'border-slate-100 text-slate-400 hover:bg-slate-50') }, [
                                    f.icon(fm===f.id), el('span', { key: 't', className: 'text-sm font-black' }, f.label)
                                ]);
                            }))
                        ])
                    ]),
                    
                    // --- メンター様ご指摘：途切れないよう慎重に記述 ---
                    el('div', { key: 'grid', className: 'grid grid-cols-2 gap-4' }, [
                        el('div', { key: 'us', className: 'bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-inner' }, [
                            el('p', { className: 'text-[11px] font-black text-blue-800 mb-3 px-1' }, '自チームの得点'),
                            el('div', { className: 'grid grid-cols-2 gap-2 mb-5' }, PT.map(function(p) {
                                return el('button', { key: p.id, disabled: !st||!fm, onClick: function() { rec(1, 'US', 'point', p.id); }, className: 'py-4 bg-blue-700 text-white text-base font-black rounded-xl disabled:opacity-20 shadow-md active:scale-95' }, p.label);
                            })),
                            el('div', { className: 'h-64 overflow-y-auto custom-scrollbar space-y-3 pr-1' }, MG.map(function(g) {
                                return el('div', { key: g }, [
                                    el('div', { className: 'text-[10px] font-black text-slate-400 uppercase mt-1 mb-2 px-1' }, g),
                                    el('div', { className: 'grid grid-cols-2 gap-2' }, MT.filter(function(m) { return m.g === g; }).map(function(m) {
                                        return el('button', { key: m.id, disabled: !st||!fm, onClick: function() { rec(1, 'OPP', 'miss', m.id); }, className: 'py-3.5 bg-white border-2 text-slate-800
