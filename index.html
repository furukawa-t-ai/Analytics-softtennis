<!DOCTYPE html>

<body class="bg-slate-50 text-slate-900 pb-24 font-sans">

    <!-- React Libraries -->

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">

        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCP4fUJBAKU7TaZ8jIRWxHzRMLLoE_T-wE",
            authDomain: "softtennis-data.firebaseapp.com",
            projectId: "softtennis-data",
            storageBucket: "softtennis-data.firebasestorage.app",
            messagingSenderId: "1082808525053",
            appId: "1:1082808525053:web:76ad357138a2b81a9a1e94",
            measurementId: "G-N9EYK4ZNSR"
        };

        const APP_ID = "soft-tennis-v1";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const { useState, useEffect, useMemo } = React;

        // --- Constants ---
        const POINT_TYPES = [
            { id: 'FP', label: 'FP' }, { id: 'BP', label: 'BP' },
            { id: 'FV', label: 'FV' }, { id: 'BV', label: 'BV' },
            { id: 'FR', label: 'FR' }, { id: 'BR', label: 'BR' },
            { id: 'SM', label: 'SM' }, { id: 'SA', label: 'SA' },
            { id: 'FL', label: 'FL' }, { id: 'BL', label: 'BL' },
        ];
        const MISS_TYPES = [
            { id: 'FPN', label: 'FPN', group: 'ネット' }, { id: 'BPN', label: 'BPN', group: 'ネット' },
            { id: 'FVN', label: 'FVN', group: 'ネット' }, { id: 'BVN', label: 'BVN', group: 'ネット' },
            { id: 'SMN', label: 'SMN', group: 'ネット' }, { id: 'FPB', label: 'FPB', group: 'バック' },
            { id: 'BPB', label: 'BPB', group: 'バック' }, { id: 'FLB', label: 'FLB', group: 'バック' },
            { id: 'BLB', label: 'BLB', group: 'バック' }, { id: 'FVB', label: 'FVB', group: 'バック' },
            { id: 'BVB', label: 'BVB', group: 'バック' }, { id: 'SMB', label: 'SMB', group: 'バック' },
            { id: 'FPS', label: 'FPS', group: 'サイド' }, { id: 'BPS', label: 'BPS', group: 'サイド' },
            { id: 'FLS', label: 'FLS', group: 'サイド' }, { id: 'BLS', label: 'BLS', group: 'サイド' },
            { id: 'FVS', label: 'FVS', group: 'サイド' }, { id: 'BVS', label: 'BVS', group: 'サイド' },
            { id: 'SMS', label: 'SMS', group: 'サイド' }, { id: 'W', label: 'W', group: 'その他' },
        ];
        const MISS_GROUPS = ['ネット', 'バック', 'サイド', 'その他'];
        
        // アイコン消滅防止のためSVGを直接定義
        const FORMATIONS = [
            { 
                id: 'cross_left', label: '正クロス', 
                icon: (isActive) => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "3", strokeLinecap: "round", strokeLinejoin: "round", className: `w-8 h-8 mb-2 mx-auto ${isActive ? 'text-blue-600' : 'text-slate-400'}` }, [
                    React.createElement('line', { key: 1, x1: "17", y1: "17", x2: "7", y2: "7" }),
                    React.createElement('polyline', { key: 2, points: "7 17 7 7 17 7" })
                ])
            },
            { 
                id: 'straight', label: 'ストレート', 
                icon: (isActive) => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "3", strokeLinecap: "round", strokeLinejoin: "round", className: `w-8 h-8 mb-2 mx-auto ${isActive ? 'text-blue-600' : 'text-slate-400'}` }, [
                    React.createElement('line', { key: 1, x1: "12", y1: "19", x2: "12", y2: "5" }),
                    React.createElement('polyline', { key: 2, points: "5 12 12 5 19 12" })
                ])
            },
            { 
                id: 'cross_right', label: '逆クロス', 
                icon: (isActive) => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "3", strokeLinecap: "round", strokeLinejoin: "round", className: `w-8 h-8 mb-2 mx-auto ${isActive ? 'text-blue-600' : 'text-slate-400'}` }, [
                    React.createElement('line', { key: 1, x1: "7", y1: "17", x2: "17", y2: "7" }),
                    React.createElement('polyline', { key: 2, points: "7 7 17 7 17 17" })
                ])
            },
        ];

        // --- Main App ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('input');
            const [matches, setMatches] = useState([]);

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                    else signInAnonymously(auth).catch(console.error);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'matches'));
                return onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setMatches(data.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                    setTimeout(() => lucide.createIcons(), 100);
                });
            }, [user]);

            useEffect(() => { lucide.createIcons(); }, [view, matches]);

            return React.createElement('div', { className: 'min-h-screen pb-10' }, [
                React.createElement('header', { className: 'bg-blue-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg' }, [
                    React.createElement('div', { className: 'flex items-center gap-2' }, [
                        React.createElement('i', { 'data-lucide': 'activity', className: 'w-6 h-6 text-yellow-400' }),
                        React.createElement('h1', { className: 'text-xl font-black italic tracking-tighter' }, 'ST-ANALYTICS')
                    ]),
                    user && React.createElement('span', { className: 'text-[8px] opacity-40 font-mono' }, user.uid.substring(0,8))
                ]),

                React.createElement('main', { className: 'max-w-4xl mx-auto p-4' }, [
                    view === 'input' && React.createElement(InputSection, { user, db }),
                    view === 'player' && React.createElement(PlayerDashboard, { matches }),
                    view === 'team' && React.createElement(TeamDashboard, { matches, db })
                ]),

                React.createElement('nav', { className: 'fixed bottom-0 left-0 right-0 bg-white border-t p-2 pb-6 flex justify-around shadow-2xl z-50' }, [
                    { id: 'input', icon: 'plus-circle', label: '入力' },
                    { id: 'player', icon: 'user', label: '個人' },
                    { id: 'team', icon: 'users', label: 'チーム' }
                ].map(item => 
                    React.createElement('button', {
                        key: item.id,
                        onClick: () => setView(item.id),
                        className: `flex flex-col items-center p-2 rounded-xl transition-all ${view === item.id ? 'text-blue-600 bg-blue-50 scale-105' : 'text-slate-400'}`
                    }, [
                        React.createElement('i', { 'data-lucide': item.icon, className: 'w-6 h-6' }),
                        React.createElement('span', { className: 'text-[10px] mt-1 font-bold' }, item.label)
                    ])
                ))
            ]);
        }

        // --- Input Section ---
        function InputSection({ user, db }) {
            const [step, setStep] = useState('meta');
            const [matchInfo, setMatchInfo] = useState({
                type: 'doubles', gameCount: 7, tournament: '', player1: '', player2: '', opponent: '', points: []
            });
            const [scores, setScores] = useState({ p1: 0, p2: 0, g1: 0, g2: 0 });
            const [serveStatus, setServeStatus] = useState(null);
            const [formation, setFormation] = useState(null);
            const [history, setHistory] = useState([]);
            // サーブ権の管理（初期値は自チーム）
            const [isUsServing, setIsUsServing] = useState(true);

            const recordPoint = (winnerSide, sideLabel, type, code) => {
                setHistory([...history, { 
                    matchInfo: JSON.parse(JSON.stringify(matchInfo)), 
                    scores: {...scores},
                    isUsServing 
                }]);
                
                // 現在のサーブ権を保存
                const newPoint = { winnerSide, sideLabel, type, code, serveStatus, formation, gameIndex: scores.g1 + scores.g2, isOurServe: isUsServing };
                const newMatchInfo = { ...matchInfo, points: [...matchInfo.points, newPoint] };
                
                let { p1, p2, g1, g2 } = scores;
                if (winnerSide === 1) p1++; else p2++;

                if (p1 >= 4 && p1 - p2 >= 2) { 
                    g1++; p1 = 0; p2 = 0; 
                    setIsUsServing(!isUsServing); // ゲーム終了時にサーブ権を交代
                }
                else if (p2 >= 4 && p2 - p1 >= 2) { 
                    g2++; p1 = 0; p2 = 0; 
                    setIsUsServing(!isUsServing); // ゲーム終了時にサーブ権を交代
                }

                setMatchInfo(newMatchInfo);
                setScores({ p1, p2, g1, g2 });
                setServeStatus(null); setFormation(null);

                const limit = Math.ceil(matchInfo.gameCount / 2);
                if (g1 >= limit || g2 >= limit) setStep('summary');
            };

            const undo = () => {
                if (history.length === 0) return;
                const last = history[history.length - 1];
                setMatchInfo(last.matchInfo);
                setScores(last.scores);
                setIsUsServing(last.isUsServing);
                setHistory(history.slice(0, -1));
            };

            if (step === 'meta') {
                return React.createElement('div', { className: 'bg-white p-6 rounded-2xl shadow-sm border space-y-6' }, [
                    React.createElement('h2', { className: 'text-xl font-bold border-b pb-2' }, '試合設定'),
                    React.createElement('div', { className: 'space-y-4' }, [
                        React.createElement('div', {}, [
                            React.createElement('label', { className: 'text-[10px] font-bold text-slate-400 block mb-1 uppercase' }, '種目'),
                            React.createElement('div', { className: 'flex gap-2' }, [
                                { id: 'doubles', label: 'ダブルス' }, { id: 'singles', label: 'シングルス' }
                            ].map(t => React.createElement('button', { key: t.id, onClick: () => setMatchInfo({...matchInfo, type: t.id}), className: `flex-1 py-3 rounded-xl border-2 font-bold ${matchInfo.type === t.id ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-slate-100 text-slate-400'}` }, t.label)))
                        ]),
                        React.createElement('div', {}, [
                            React.createElement('label', { className: 'text-[10px] font-bold text-slate-400 block mb-1 uppercase' }, 'ゲーム数'),
                            React.createElement('div', { className: 'flex gap-2' }, [5, 7, 9].map(num => React.createElement('button', { key: num, onClick: () => setMatchInfo({...matchInfo, gameCount: num}), className: `flex-1 py-3 rounded-xl border-2 font-bold ${matchInfo.gameCount === num ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-slate-100 text-slate-400'}` }, `${num}回戦`)))
                        ]),
                        React.createElement('input', { className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '大会名', value: matchInfo.tournament, onChange: e => setMatchInfo({...matchInfo, tournament: e.target.value}) }),
                        React.createElement('div', { className: 'grid grid-cols-2 gap-2' }, [
                            React.createElement('input', { className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '自チーム選手1', value: matchInfo.player1, onChange: e => setMatchInfo({...matchInfo, player1: e.target.value}) }),
                            matchInfo.type === 'doubles' && React.createElement('input', { className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold', placeholder: '自チーム選手2', value: matchInfo.player2, onChange: e => setMatchInfo({...matchInfo, player2: e.target.value}) }),
                        ]),
                        React.createElement('input', { className: 'w-full bg-slate-50 border p-4 rounded-xl font-bold text-red-600', placeholder: '相手チーム名 / 選手名', value: matchInfo.opponent, onChange: e => setMatchInfo({...matchInfo, opponent: e.target.value}) }),
                    ]),
                    React.createElement('button', { className: 'w-full bg-blue-700 text-white p-5 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-transform', onClick: () => (matchInfo.player1 && matchInfo.opponent) ? setStep('recording') : alert('選手名と相手チームを入力してください') }, '試合開始')
                ]);
            }

            if (step === 'recording') {
                return React.createElement('div', { className: 'space-y-4' }, [
                    // --- Scoreboard ---
                    React.createElement('div', { className: 'bg-slate-900 text-white p-6 rounded-3xl shadow-xl flex justify-between items-stretch relative' }, [
                        // サーブ切替の説明テキスト
                        React.createElement('div', { className: 'absolute -top-3 left-1/2 transform -translate-x-1/2 bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[9px] font-bold shadow-sm z-10 whitespace-nowrap' }, '※🎾マークをタップでサーブ権を変更'),
                        
                        React.createElement('div', { className: 'text-center flex-1 flex flex-col justify-between relative', onClick: () => setIsUsServing(true) }, [
                            isUsServing && React.createElement('div', { className: 'absolute -top-2 left-0 text-3xl animate-bounce drop-shadow-md' }, '🎾'),
                            React.createElement('div', { className: 'mb-3' }, [
                                React.createElement('div', { className: 'text-[10px] font-black text-blue-400 uppercase tracking-widest' }, 'OUR TEAM'),
                                React.createElement('div', { className: 'text-xl font-black leading-tight break-words px-2' }, `${matchInfo.player1}${matchInfo.player2 ? ' / ' + matchInfo.player2 : ''}`)
                            ]),
                            React.createElement('div', { className: 'text-6xl font-black mb-1' }, scores.g1),
                            React.createElement('div', { className: 'inline-block self-center px-6 py-1 bg-blue-600 rounded-full text-lg font-black' }, scores.p1)
                        ]),
                        React.createElement('div', { className: 'flex items-center px-4' }, [
                            React.createElement('div', { className: 'h-24 w-px bg-slate-700' })
                        ]),
                        React.createElement('div', { className: 'text-center flex-1 flex flex-col justify-between relative', onClick: () => setIsUsServing(false) }, [
                            !isUsServing && React.createElement('div', { className: 'absolute -top-2 right-0 text-3xl animate-bounce drop-shadow-md' }, '🎾'),
                            React.createElement('div', { className: 'mb-3' }, [
                                React.createElement('div', { className: 'text-[10px] font-black text-red-400 uppercase tracking-widest' }, 'OPPONENT'),
                                React.createElement('div', { className: 'text-xl font-black leading-tight break-words px-2' }, matchInfo.opponent)
                            ]),
                            React.createElement('div', { className: 'text-6xl font-black mb-1' }, scores.g2),
                            React.createElement('div', { className: 'inline-block self-center px-6 py-1 bg-red-600 rounded-full text-lg font-black' }, scores.p2)
                        ])
                    ]),
                    
                    React.createElement('div', { className: 'flex justify-center' }, 
                        React.createElement('button', { onClick: undo, disabled: history.length === 0, className: 'flex items-center gap-2 bg-slate-200 text-slate-600 px-5 py-2 rounded-full text-xs font-black disabled:opacity-30 active:scale-95 transition-transform' }, [
                            React.createElement('i', { 'data-lucide': 'undo-2', className: 'w-3 h-3' }), '訂正（1手戻る）'
                        ])
                    ),

                    // --- Serve & Formation ---
                    React.createElement('div', { className: 'grid grid-cols-2 gap-3' }, [
                        React.createElement('div', { className: 'bg-white p-3 rounded-2xl border shadow-sm' }, [
                            React.createElement('label', { className: 'text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-wider' }, '1. サーブ'),
                            React.createElement('div', { className: 'flex gap-2 h-24' }, [1, 2].map(s => 
                                React.createElement('button', { key: s, onClick: () => setServeStatus(s), className: `flex-1 rounded-xl border-2 font-black text-2xl transition-all ${serveStatus === s ? 'border-blue-600 bg-blue-50 text-blue-700 ring-2 ring-blue-100' : 'border-slate-100 text-slate-300'}` }, `${s}st`)
                            ))
                        ]),
                        React.createElement('div', { className: 'bg-white p-3 rounded-2xl border shadow-sm' }, [
                            React.createElement('label', { className: 'text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-wider' }, '2. 展開'),
                            React.createElement('div', { className: 'flex gap-2 h-24' }, FORMATIONS.map(f => 
                                React.createElement('button', { key: f.id, onClick: () => setFormation(f.id), className: `direction-btn flex-1 rounded-xl border-2 flex flex-col items-center justify-center ${formation === f.id ? 'active border-blue-600 bg-blue-50 text-blue-700' : 'border-slate-100 text-slate-400 hover:bg-slate-50'}` }, [
                                    f.icon(formation === f.id),
                                    React.createElement('span', { className: 'text-sm font-black' }, f.label)
