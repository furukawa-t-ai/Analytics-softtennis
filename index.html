<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ST-ANALYTICS | プロ仕様分析ツール</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .hidden { display: none !important; }
        .btn-active { border-color: #2563eb !important; background-color: #eff6ff !important; color: #1d4ed8 !important; }
    </style>

    <!-- エラー監視エリア -->
    <script>
        window.addEventListener('error', function(e) {
            const errBox = document.getElementById('error-box');
            if(errBox) { errBox.classList.remove('hidden'); errBox.innerHTML += '【エラー】' + e.message + '<br>'; }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 font-sans">
    
    <!-- 起動時のローディングカバー -->
    <div id="loading-screen" class="fixed inset-0 bg-slate-50 z-[9999] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <div class="text-slate-500 font-bold text-sm tracking-widest">SYSTEM LOADING...</div>
    </div>

    <!-- 万が一のエラー表示用 -->
    <div id="error-box" class="hidden bg-red-100 text-red-700 p-4 font-bold text-xs"></div>

    <!-- ヘッダー -->
    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6 text-yellow-400"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            <h1 class="text-xl font-black italic tracking-tighter">ST-ANALYTICS</h1>
        </div>
        <span id="uid-display" class="text-[8px] opacity-40 font-mono">Loading...</span>
    </header>

    <!-- メインコンテンツ -->
    <main class="max-w-4xl mx-auto p-4">
        
        <!-- ===== 1. 入力画面 ===== -->
        <div id="view-input">
            <!-- 1-1. 試合設定 -->
            <div id="step-meta" class="bg-white p-6 rounded-2xl shadow-sm border space-y-6">
                <h2 class="text-xl font-bold border-b pb-2">試合設定</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">種目</label>
                        <div class="flex gap-2">
                            <button id="btn-type-doubles" class="btn-type flex-1 py-3 rounded-xl border-2 font-bold btn-active" data-val="doubles">ダブルス</button>
                            <button id="btn-type-singles" class="btn-type flex-1 py-3 rounded-xl border-2 font-bold text-slate-400" data-val="singles">シングルス</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">ゲーム数</label>
                        <div class="flex gap-2">
                            <button id="btn-gc-5" class="btn-gc flex-1 py-3 rounded-xl border-2 font-bold text-slate-400" data-val="5">5回戦</button>
                            <button id="btn-gc-7" class="btn-gc flex-1 py-3 rounded-xl border-2 font-bold btn-active" data-val="7">7回戦</button>
                            <button id="btn-gc-9" class="btn-gc flex-1 py-3 rounded-xl border-2 font-bold text-slate-400" data-val="9">9回戦</button>
                        </div>
                    </div>
                    <input type="text" id="in-t" class="w-full bg-slate-50 border p-4 rounded-xl font-bold" placeholder="大会名">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="in-p1" class="w-full bg-slate-50 border p-4 rounded-xl font-bold" placeholder="自チーム選手1">
                        <input type="text" id="in-p2" class="w-full bg-slate-50 border p-4 rounded-xl font-bold" placeholder="自チーム選手2">
                    </div>
                    <input type="text" id="in-opp" class="w-full bg-slate-50 border p-4 rounded-xl font-bold text-red-600" placeholder="相手チーム名">
                </div>
                <button id="btn-start" class="w-full bg-blue-700 text-white p-5 rounded-2xl font-black text-lg active:scale-95 transition-transform mt-6">試合開始</button>
            </div>

            <!-- 1-2. スコア記録 -->
            <div id="step-rec" class="hidden space-y-4">
                <div id="sc-board" class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl flex justify-between relative items-stretch transition-all">
                    <div id="badge-final" class="hidden absolute -top-4 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-yellow-500 to-orange-500 text-white px-4 py-1 rounded-full text-[10px] font-black shadow-lg z-10 whitespace-nowrap tracking-widest border border-white">🔥 FINAL GAME 🔥</div>
                    <div id="badge-normal" class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[9px] font-bold shadow-sm z-10 whitespace-nowrap">※🎾をタップでサーブ変更</div>
                    
                    <div id="area-us-srv" class="text-center flex-1 flex flex-col justify-between relative cursor-pointer">
                        <!-- ★修正1: 初期状態をhiddenにし、JSで制御する -->
                        <div id="srv-us" class="absolute -top-2 left-0 text-3xl animate-bounce drop-shadow-md hidden">🎾</div>
                        <div class="mb-3">
                            <div class="text-[10px] text-blue-400 font-black uppercase">OURS</div>
                            <div id="disp-us-names" class="text-xl font-black leading-tight"></div>
                        </div>
                        <div id="disp-g1" class="text-6xl font-black mb-1">0</div>
                        <div id="disp-p1" class="inline-block self-center px-6 py-1 bg-blue-600 rounded-full text-lg font-black">0</div>
                    </div>
                    
                    <div class="flex items-center px-4"><div class="h-24 w-px bg-slate-700"></div></div>
                    
                    <div id="area-opp-srv" class="text-center flex-1 flex flex-col justify-between relative cursor-pointer">
                        <div id="srv-opp" class="absolute -top-2 right-0 text-3xl animate-bounce drop-shadow-md hidden">🎾</div>
                        <div class="mb-3">
                            <div class="text-[10px] text-red-400 font-black uppercase">OPP</div>
                            <div id="disp-opp-name" class="text-xl font-black leading-tight"></div>
                        </div>
                        <div id="disp-g2" class="text-6xl font-black mb-1">0</div>
                        <div id="disp-p2" class="inline-block self-center px-6 py-1 bg-red-600 rounded-full text-lg font-black">0</div>
                    </div>
                </div>

                <div class="flex justify-center">
                    <button id="btn-undo" disabled class="flex items-center gap-2 bg-slate-200 text-slate-600 px-5 py-2 rounded-full text-xs font-black disabled:opacity-30 active:scale-95 transition-transform">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3 h-3"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
                        訂正（1手戻る）
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-3 rounded-2xl border shadow-sm">
                        <label class="text-[10px] font-black text-slate-400 block mb-2">1. サーブ</label>
                        <div class="flex gap-2 h-24">
                            <button id="btn-st-1" class="btn-st flex-1 rounded-xl border-2 font-black text-2xl text-slate-300 transition-colors" data-val="1">1st</button>
                            <button id="btn-st-2" class="btn-st flex-1 rounded-xl border-2 font-black text-2xl text-slate-300 transition-colors" data-val="2">2nd</button>
                        </div>
                    </div>
                    <div class="bg-white p-3 rounded-2xl border shadow-sm">
                        <label class="text-[10px] font-black text-slate-400 block mb-2">2. 展開</label>
                        <div class="flex gap-1 h-24">
                            <button id="btn-fm-cross_left" class="btn-fm flex-1 rounded-xl border-2 flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 transition-colors" data-val="cross_left">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 mb-1"><line x1="17" y1="17" x2="7" y2="7"></line><polyline points="7 17 7 7 17 7"></polyline></svg><span class="text-[10px] font-black">正クロス</span>
                            </button>
                            <button id="btn-fm-straight" class="btn-fm flex-1 rounded-xl border-2 flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 transition-colors" data-val="straight">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 mb-1"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg><span class="text-[10px] font-black">ストレート</span>
                            </button>
                            <button id="btn-fm-cross_right" class="btn-fm flex-1 rounded-xl border-2 flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 transition-colors" data-val="cross_right">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 mb-1"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg><span class="text-[10px] font-black">逆クロス</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ★修正2＆3: スクロール枠の固定と、表記の明確化 -->
                <div class="grid grid-cols-2 gap-2 sm:gap-4">
                    <div class="bg-blue-50 p-2 sm:p-4 rounded-2xl border border-blue-100 shadow-inner flex flex-col h-[400px]">
                        <p class="text-[10px] sm:text-xs font-black text-blue-800 mb-2 px-1 shrink-0">自チームが獲得したポイント</p>
                        <div id="us-pts" class="grid grid-cols-2 gap-1 sm:gap-2 mb-2 shrink-0"></div>
                        
                        <p class="text-[10px] sm:text-xs font-black text-blue-800 mt-2 mb-2 px-1 border-t border-blue-200 pt-2 shrink-0">相手のミスによるポイント</p>
                        <div id="us-miss" class="overflow-y-auto custom-scrollbar pr-1 pb-4 grow"></div>
                    </div>
                    
                    <div class="bg-red-50 p-2 sm:p-4 rounded-2xl border border-red-100 shadow-inner flex flex-col h-[400px]">
                        <p class="text-[10px] sm:text-xs font-black text-red-800 mb-2 px-1 shrink-0">相手チームが獲得したポイント</p>
                        <div id="opp-pts" class="grid grid-cols-2 gap-1 sm:gap-2 mb-2 shrink-0"></div>
                        
                        <p class="text-[10px] sm:text-xs font-black text-red-800 mt-2 mb-2 px-1 border-t border-red-200 pt-2 shrink-0">自チームのミスによるポイント</p>
                        <div id="opp-miss" class="overflow-y-auto custom-scrollbar pr-1 pb-4 grow"></div>
                    </div>
                </div>
            </div>

            <!-- 1-3. 結果サマリー -->
            <div id="step-sum" class="hidden bg-white p-10 rounded-3xl shadow-2xl text-center">
                <div class="flex justify-center mb-4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-16 h-16 text-yellow-400"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg></div>
                <h2 class="text-2xl font-black mb-2 italic mt-4">MATCH COMPLETE</h2>
                <p id="sum-t" class="text-slate-400 text-xs font-bold mb-6"></p>
                <div class="flex justify-center items-center gap-8 mb-10">
                    <div class="text-center">
                        <div id="sum-us-n" class="text-sm font-black text-blue-600 mb-1"></div>
                        <div id="sum-us-g" class="text-6xl font-black text-blue-600">0</div>
                    </div>
                    <div class="text-2xl font-black text-slate-200">VS</div>
                    <div class="text-center">
                        <div id="sum-opp-n" class="text-sm font-black text-red-600 mb-1"></div>
                        <div id="sum-opp-g" class="text-6xl font-black text-red-600">0</div>
                    </div>
                </div>
                <button id="btn-save" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-transform">データを保存して終了</button>
            </div>
        </div>

        <!-- ===== 2. 個人分析画面 ===== -->
        <div id="view-player" class="hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl border shadow-sm">
                <label class="text-[10px] font-black text-slate-400 block mb-2">選手を選択して分析</label>
                <select id="sel-player" class="w-full p-4 border rounded-xl font-black bg-slate-50">
                    <option value="">-- 選手を選択 --</option>
                </select>
            </div>
            <div id="player-stats" class="hidden space-y-6"></div>
        </div>

        <!-- ===== 3. チーム画面 ===== -->
        <div id="view-team" class="hidden space-y-4">
            <div class="flex justify-between items-center px-1 mb-2">
                <h3 class="text-sm font-black text-slate-400">全試合履歴</h3>
                <button id="btn-csv" class="flex items-center gap-1 text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full hover:bg-blue-100 shadow-sm active:scale-95">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3 h-3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    CSVダウンロード
                </button>
            </div>
            <div id="team-list" class="space-y-4"></div>
        </div>
    </main>

    <!-- ナビゲーションバー -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 pb-6 flex justify-around shadow-2xl z-50">
        <button id="nav-input" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-all text-blue-600 bg-blue-50 scale-105" data-val="input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span class="text-[10px] mt-1 font-bold">入力</span>
        </button>
        <button id="nav-player" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-all text-slate-400" data-val="player">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="text-[10px] mt-1 font-bold">個人</span>
        </button>
        <button id="nav-team" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-all text-slate-400" data-val="team">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            <span class="text-[10px] mt-1 font-bold">チーム</span>
        </button>
    </nav>


    <!-- ==============================================================
         最優先で実行するコアシステム
         ============================================================== -->
    <script>
        // ----------------------------------------------------
        // 状態管理 (State)
        // ----------------------------------------------------
        const State = {
            view: 'input', step: 'meta', type: 'doubles', gc: 7, 
            t: '', p1: '', p2: '', opp: '', pts: [],
            sc: { p1: 0, p2: 0, g1: 0, g2: 0 },
            st: null, fm: null, his: [], isUsSrv: true,
            user: null, matches: [],
            
            PT: [ 
                { id: 'FP', label: 'FP' }, { id: 'BP', label: 'BP' }, 
                { id: 'FV', label: 'FV' }, { id: 'BV', label: 'BV' }, 
                { id: 'FR', label: 'FR' }, { id: 'BR', label: 'BR' }, 
                { id: 'SM', label: 'SM' }, { id: 'SA', label: 'SA' }, 
                { id: 'FL', label: 'FL' }, { id: 'BL', label: 'BL' } 
            ],
            MT: [ 
                { id: 'FPN', label: 'FPN', g: 'ネット' }, { id: 'BPN', label: 'BPN', g: 'ネット' }, 
                { id: 'FVN', label: 'FVN', g: 'ネット' }, { id: 'BVN', label: 'BVN', g: 'ネット' }, 
                { id: 'SMN', label: 'SMN', g: 'ネット' }, { id: 'FPB', label: 'FPB', g: 'バック' }, 
                { id: 'BPB', label: 'BPB', g: 'バック' }, { id: 'FVB', label: 'FVB', g: 'バック' }, 
                { id: 'BVB', label: 'BVB', g: 'バック' }, { id: 'SMB', label: 'SMB', g: 'バック' }, 
                { id: 'FPS', label: 'FPS', g: 'サイド' }, { id: 'BPS', label: 'BPS', g: 'サイド' }, 
                { id: 'FVS', label: 'FVS', g: 'サイド' }, { id: 'BVS', label: 'BVS', g: 'サイド' }, 
                { id: 'SMS', label: 'SMS', g: 'サイド' }, { id: 'W', label: 'W', g: 'その他' } 
            ],
            MG: ['ネット', 'バック', 'サイド', 'その他']
        };

        // ----------------------------------------------------
        // スコア計算ロジック (Logic)
        // ----------------------------------------------------
        const Logic = {
            calcNextScore: function(wSide) {
                let p1 = State.sc.p1, p2 = State.sc.p2, g1 = State.sc.g1, g2 = State.sc.g2;
                if (wSide === 1) p1++; else p2++;

                let gameWonBy = 0;
                const isFinalGame = (g1 + g2 === State.gc - 1);

                if (isFinalGame) {
                    if (p1 >= 7 && p1 - p2 >= 2) gameWonBy = 1;
                    else if (p2 >= 7 && p2 - p1 >= 2) gameWonBy = 2;
                    if ((p1 + p2) % 2 === 1) State.isUsSrv = !State.isUsSrv;
                } else {
                    if (p1 >= 4 && p1 - p2 >= 2) gameWonBy = 1;
                    else if (p2 >= 4 && p2 - p1 >= 2) gameWonBy = 2;
                }

                if (gameWonBy !== 0) {
                    if (gameWonBy === 1) g1++; else g2++;
                    p1 = 0; p2 = 0;
                    if (!isFinalGame) State.isUsSrv = !State.isUsSrv;
                }

                State.sc = { p1, p2, g1, g2 };
                State.st = null; 
                State.fm = null;
                
                return (g1 >= Math.ceil(State.gc/2) || g2 >= Math.ceil(State.gc/2));
            }
        };

        // ----------------------------------------------------
        // 画面描画ロジック (UI)
        // ----------------------------------------------------
        const UI = {
            initPointsButtons: function() {
                const usPts = document.getElementById('us-pts');
                const oppPts = document.getElementById('opp-pts');
                const usMiss = document.getElementById('us-miss');
                const oppMiss = document.getElementById('opp-miss');
                
                // 獲得ポイント用ボタン
                State.PT.forEach(p => {
                    usPts.insertAdjacentHTML('beforeend', `<button class="pt-btn py-2 sm:py-3 bg-blue-700 text-white text-xs sm:text-sm font-black rounded-lg shadow-md active:scale-95 disabled:opacity-20 transition-transform" disabled data-side="1" data-lbl="US" data-type="point" data-code="${p.id}">${p.label}</button>`);
                    oppPts.insertAdjacentHTML('beforeend', `<button class="pt-btn py-2 sm:py-3 bg-red-700 text-white text-xs sm:text-sm font-black rounded-lg shadow-md active:scale-95 disabled:opacity-20 transition-transform" disabled data-side="2" data-lbl="OPP" data-type="point" data-code="${p.id}">${p.label}</button>`);
                });

                // ミス用ボタン (相手のミス = 自チームの得点)
                State.MG.forEach(g => {
                    let h1 = `<div class="mb-3"><div class="text-[10px] font-black text-slate-500 bg-slate-200 px-2 py-0.5 rounded-sm inline-block mb-1">${g}</div><div class="grid grid-cols-2 gap-1 sm:gap-2">`;
                    State.MT.filter(m => m.g === g).forEach(m => {
                        h1 += `<button class="pt-btn py-2 sm:py-3 bg-white border-2 border-slate-200 text-slate-800 text-xs sm:text-sm font-black rounded-lg shadow-sm active:scale-95 disabled:opacity-20 transition-transform" disabled data-side="1" data-lbl="OPP" data-type="miss" data-code="${m.id}">${m.label}</button>`;
                    });
                    h1 += `</div></div>`;
                    usMiss.insertAdjacentHTML('beforeend', h1);

                    // (自チームのミス = 相手チームの得点)
                    let h2 = `<div class="mb-3"><div class="text-[10px] font-black text-slate-500 bg-slate-200 px-2 py-0.5 rounded-sm inline-block mb-1">${g}</div><div class="grid grid-cols-2 gap-1 sm:gap-2">`;
                    State.MT.filter(m => m.g === g).forEach(m => {
                        h2 += `<button class="pt-btn py-2 sm:py-3 bg-white border-2 border-slate-200 text-slate-800 text-xs sm:text-sm font-black rounded-lg shadow-sm active:scale-95 disabled:opacity-20 transition-transform" disabled data-side="2" data-lbl="US" data-type="miss" data-code="${m.id}">${m.label}</button>`;
                    });
                    h2 += `</div></div>`;
                    oppMiss.insertAdjacentHTML('beforeend', h2);
                });
            },
            switchNav: function(v) {
                ['input', 'player', 'team'].forEach(id => {
                    document.getElementById('view-' + id).classList.add('hidden');
                    const nav = document.getElementById('nav-' + id);
                    nav.classList.remove('text-blue-600', 'bg-blue-50', 'scale-105');
                    nav.classList.add('text-slate-400');
                });
                document.getElementById('view-' + v).classList.remove('hidden');
                const activeNav = document.getElementById('nav-' + v);
                activeNav.classList.remove('text-slate-400');
                activeNav.classList.add('text-blue-600', 'bg-blue-50', 'scale-105');
            },
            updateType: function() {
                document.getElementById('btn-type-doubles').className = `btn-type flex-1 py-3 rounded-xl border-2 font-bold transition-colors ${State.type === 'doubles' ? 'btn-active' : 'text-slate-400'}`;
                document.getElementById('btn-type-singles').className = `btn-type flex-1 py-3 rounded-xl border-2 font-bold transition-colors ${State.type === 'singles' ? 'btn-active' : 'text-slate-400'}`;
                document.getElementById('in-p2').style.display = State.type === 'doubles' ? 'block' : 'none';
            },
            updateGC: function() {
                [5,7,9].forEach(n => {
                    document.getElementById('btn-gc-' + n).className = `btn-gc flex-1 py-3 rounded-xl border-2 font-bold transition-colors ${State.gc == n ? 'btn-active' : 'text-slate-400'}`;
                });
            },
            updateScoreBoard: function() {
                const isFinal = (State.sc.g1 + State.sc.g2 === State.gc - 1);
                document.getElementById('sc-board').className = `bg-slate-900 text-white p-6 rounded-3xl shadow-xl flex justify-between relative items-stretch transition-all ${isFinal ? 'border-4 border-yellow-500 shadow-yellow-500/30' : ''}`;
                document.getElementById('badge-final').style.display = isFinal ? 'block' : 'none';
                document.getElementById('badge-normal').style.display = isFinal ? 'none' : 'block';

                document.getElementById('disp-us-names').textContent = State.p1 + (State.type === 'doubles' && State.p2 ? ' / ' + State.p2 : '');
                document.getElementById('disp-opp-name').textContent = State.opp;
                document.getElementById('disp-g1').textContent = State.sc.g1;
                document.getElementById('disp-p1').textContent = State.sc.p1;
                document.getElementById('disp-g2').textContent = State.sc.g2;
                document.getElementById('disp-p2').textContent = State.sc.p2;

                // ★修正1: CSSクラスの付け外しでサーブ表示を切り替える
                document.getElementById('srv-us').classList.toggle('hidden', !State.isUsSrv);
                document.getElementById('srv-opp').classList.toggle('hidden', State.isUsSrv);

                const canRecord = (State.st !== null && State.fm !== null);
                document.querySelectorAll('.pt-btn').forEach(b => b.disabled = !canRecord);
                
                [1,2].forEach(i => {
                    const btn = document.getElementById('btn-st-'+i);
                    if(btn) btn.className = `btn-st flex-1 rounded-xl border-2 font-black text-2xl transition-colors ${State.st == i ? 'btn-active' : 'text-slate-300'}`;
                });

                ['cross_left','straight','cross_right'].forEach(i => {
                    const btn = document.getElementById('btn-fm-'+i);
                    if(btn) {
                        if(State.fm === i) {
                            btn.className = "btn-fm flex-1 rounded-xl border-2 flex flex-col items-center justify-center btn-active transition-colors";
                            btn.querySelector('svg').classList.add('text-blue-600'); btn.querySelector('svg').classList.remove('text-slate-400');
                        } else {
                            btn.className = "btn-fm flex-1 rounded-xl border-2 flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 transition-colors";
                            btn.querySelector('svg').classList.remove('text-blue-600'); btn.querySelector('svg').classList.add('text-slate-400');
                        }
                    }
                });
                
                document.getElementById('btn-undo').disabled = (State.his.length === 0);
            },
            showSummary: function() {
                document.getElementById('step-rec').classList.add('hidden');
                document.getElementById('step-sum').classList.remove('hidden');
                document.getElementById('sum-t').textContent = State.t;
                document.getElementById('sum-us-n').textContent = State.p1;
                document.getElementById('sum-us-g').textContent = State.sc.g1;
                document.getElementById('sum-opp-n').textContent = State.opp;
                document.getElementById('sum-opp-g').textContent = State.sc.g2;
            },
            resetToMeta: function() {
                document.getElementById('step-sum').classList.add('hidden');
                document.getElementById('step-meta').classList.remove('hidden');
                State.sc = {p1:0,p2:0,g1:0,g2:0}; State.pts = []; State.his = [];
                document.getElementById('in-t').value = ''; document.getElementById('in-p1').value = ''; document.getElementById('in-p2').value = ''; document.getElementById('in-opp').value = '';
            },
            renderTeam: function() {
                const list = document.getElementById('team-list');
                list.innerHTML = State.matches.map(m => `
                    <div class="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center">
                        <div class="flex-1">
                            <p class="text-[8px] font-bold text-slate-300 uppercase tracking-widest mb-1">${m.t || '交流戦'}</p>
                            <p class="text-sm font-black text-slate-800">${m.p1} ${m.p2 ? '/ '+m.p2 : ''}</p>
                            <p class="text-[10px] font-bold text-red-500 mb-1">vs ${m.opp}</p>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] px-2 py-0.5 rounded-md font-black text-white ${m.winner===1?'bg-emerald-500':'bg-red-500'}">${m.winner===1?'WIN':'LOSE'}</span>
                                <span class="font-black text-2xl font-mono text-slate-900">${m.finalScore.g1}-${m.finalScore.g2}</span>
                            </div>
                            <button onclick="DB.deleteMatch('${m.id}')" class="text-[9px] text-slate-300 underline mt-2">削除</button>
                        </div>
                    </div>
                `).join('') || '<div class="py-20 text-center text-slate-300 font-black">記録された試合はありません</div>';
            },
            renderPlayerSelect: function() {
                const sel = document.getElementById('sel-player');
                const current = sel.value;
                const players = Array.from(new Set(State.matches.flatMap(m => [m.p1, m.p2].filter(Boolean)))).sort();
                sel.innerHTML = '<option value="">-- 選手を選択 --</option>';
                players.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
                if (players.includes(current)) sel.value = current;
                UI.renderPlayerStats();
            },
            renderPlayerStats: function() {
                const sel = document.getElementById('sel-player').value;
                const container = document.getElementById('player-stats');
                if (!sel) { container.classList.add('hidden'); return; }

                const pm = State.matches.filter(m => m.p1 === sel || m.p2 === sel);
                let w = 0, srvTot = 0, s1in = 0, s2in = 0, df = 0, mp = 0, mm = 0;
                let pts = {}, ms = {};

                pm.forEach(m => {
                    if(m.winner === 1) w++;
                    if(m.pts) m.pts.forEach(p => {
                        if(p.isOurServe) { srvTot++; if(p.serveStatus===1) s1in++; if(p.serveStatus===2) { s2in++; if(p.code==='W') df++; } }
                        if(p.winnerSide === 1 && p.sideLabel === 'US' && p.type === 'point') { mp++; pts[p.code] = (pts[p.code] || 0) + 1; }
                        if(p.winnerSide === 2 && p.sideLabel === 'US' && p.type === 'miss') { mm++; ms[p.code] = (ms[p.code] || 0) + 1; }
                    });
                });

                const sHit = srvTot + s2in; const sIn = s1in + (s2in - df);
                const wr = pm.length ? (w/pm.length*100).toFixed(1) : 0;
                const sT = sHit ? (sIn/sHit*100).toFixed(1) : 0;
                const s1 = srvTot ? (s1in/srvTot*100).toFixed(1) : 0;
                const s2 = s2in ? ((s2in-df)/s2in*100).toFixed(1) : 0;
                
                const prHtml = Object.keys(pts).map(c => ({ l: State.PT.find(t=>t.id===c)?.label||c, count: pts[c], r: ((pts[c]/mp)*100).toFixed(1) })).sort((a,b)=>b.count-a.count).map(p => `
                    <div><div class="flex justify-between text-xs font-bold text-slate-700 mb-1.5"><span>${p.l}</span><span class="text-blue-600">${p.r}% (${p.count}回)</span></div>
                    <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden"><div class="bg-blue-500 h-full rounded-full" style="width: ${p.r}%"></div></div></div>
                `).join('') || '<p class="text-xs text-slate-400 font-bold">データがありません</p>';

                const mrHtml = Object.keys(ms).map(c => ({ l: State.MT.find(t=>t.id===c)?.label||c, count: ms[c], r: ((ms[c]/mm)*100).toFixed(1) })).sort((a,b)=>b.count-a.count).map(m => `
                    <div><div class="flex justify-between text-xs font-bold text-slate-700 mb-1.5"><span>${m.l}</span><span class="text-red-600">${m.r}% (${m.count}回)</span></div>
                    <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden"><div class="bg-red-500 h-full rounded-full" style="width: ${m.r}%"></div></div></div>
                `).join('') || '<p class="text-xs text-slate-400 font-bold">データがありません</p>';

                container.innerHTML = `
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg stat-card"><div class="flex justify-between opacity-80"><span class="text-[9px] font-black tracking-wider">勝率</span>🏆</div><p class="text-3xl font-black">${wr}%</p></div>
                        <div class="bg-emerald-600 text-white p-4 rounded-2xl shadow-lg stat-card"><div class="flex justify-between opacity-80"><span class="text-[9px] font-black tracking-wider">サーブ成功率</span>🎯</div><p class="text-3xl font-black">${sT}%</p></div>
                        <div class="bg-indigo-600 text-white p-4 rounded-2xl shadow-lg stat-card"><div class="flex justify-between opacity-80"><span class="text-[9px] font-black tracking-wider">1stサーブ</span>⚡</div><p class="text-3xl font-black">${s1}%</p></div>
                        <div class="bg-teal-600 text-white p-4 rounded-2xl shadow-lg stat-card"><div class="flex justify-between opacity-80"><span class="text-[9px] font-black tracking-wider">2ndサーブ</span>✔️</div><p class="text-3xl font-black">${s2}%</p></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-8">
                        <div><h3 class="text-xs font-black text-blue-800 border-b pb-2 mb-4">🎯 ポイント奪取の比率</h3>${prHtml}</div>
                        <div><h3 class="text-xs font-black text-red-800 border-b pb-2 mb-4">⚠️ ミス発生の比率</h3>${mrHtml}</div>
                    </div>
                `;
                container.classList.remove('hidden');
            }
        };

        // ----------------------------------------------------
        // 📁 Events (イベント紐付け)
        // ----------------------------------------------------
        const Events = {
            init: function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => { UI.switchNav(b.dataset.val); });
                document.querySelectorAll('.btn-type').forEach(b => b.onclick = () => { State.type = b.dataset.val; UI.updateType(); });
                document.querySelectorAll('.btn-gc').forEach(b => b.onclick = () => { State.gc = parseInt(b.dataset.val); UI.updateGC(); });
                
                document.getElementById('btn-start').onclick = () => {
                    State.t = document.getElementById('in-t').value;
                    State.p1 = document.getElementById('in-p1').value;
                    State.p2 = document.getElementById('in-p2').value;
                    State.opp = document.getElementById('in-opp').value;
                    if (!State.p1 || !State.opp) return alert('選手名と相手チームを入力してください');
                    State.step = 'rec';
                    document.getElementById('step-meta').classList.add('hidden');
                    document.getElementById('step-rec').classList.remove('hidden');
                    UI.updateScoreBoard();
                };

                document.getElementById('area-us-srv').onclick = () => { State.isUsSrv = true; UI.updateScoreBoard(); };
                document.getElementById('area-opp-srv').onclick = () => { State.isUsSrv = false; UI.updateScoreBoard(); };

                document.getElementById('btn-undo').onclick = () => {
                    if (State.his.length === 0) return;
                    const l = State.his.pop();
                    State.sc = l.sc; State.pts = l.pts; State.isUsSrv = l.isUsSrv;
                    UI.updateScoreBoard();
                };

                document.querySelectorAll('.btn-st').forEach(b => b.onclick = () => { State.st = parseInt(b.dataset.val); UI.updateScoreBoard(); });
                document.querySelectorAll('.btn-fm').forEach(b => b.onclick = () => { State.fm = b.dataset.val; UI.updateScoreBoard(); });

                document.getElementById('btn-save').onclick = () => { DB.saveMatch(); };
                document.getElementById('sel-player').onchange = () => { UI.renderPlayerStats(); };

                document.getElementById('btn-csv').onclick = () => {
                    let csv = "日時,大会名,種目,自チーム選手1,自チーム選手2,相手チーム,試合結果,自G,相G,ポイントIndex,ゲームIndex,サーブ権,1st/2nd,展開,得点チーム,得点/ミス,コード\n";
                    State.matches.forEach(m => {
                        const d = m.createdAt ? new Date(m.createdAt).toLocaleString('ja-JP').replace(/,/g, '') : '';
                        if (!m.pts) return;
                        m.pts.forEach((p, idx) => {
                            let row = [
                                d, m.t || '', m.type, m.p1 || '', m.p2 || '', m.opp || '',
                                m.winner === 1 ? 'WIN' : 'LOSE', m.finalScore.g1, m.finalScore.g2,
                                idx + 1, (p.gameIndex || 0) + 1, p.isOurServe ? '自' : '相手',
                                p.serveStatus || '', p.formation || '', p.winnerSide === 1 ? '自' : '相手',
                                p.type, p.code
                            ];
                            csv += '"' + row.join('","') + '"\n';
                        });
                    });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' }));
                    link.download = `ST_Data.csv`; link.click();
                };

                document.addEventListener('click', function(e) {
                    const btn = e.target.closest('.pt-btn');
                    if (!btn || btn.disabled) return;
                    
                    State.his.push({ sc: Object.assign({}, State.sc), pts: [...State.pts], isUsSrv: State.isUsSrv });
                    
                    const wSide = parseInt(btn.dataset.side);
                    State.pts.push({ winnerSide: wSide, sideLabel: btn.dataset.lbl, type: btn.dataset.type, code: btn.dataset.code, serveStatus: State.st, formation: State.fm, gameIndex: State.sc.g1+State.sc.g2, isOurServe: State.isUsSrv });

                    const isEnded = Logic.calcNextScore(wSide);
                    
                    if (isEnded) UI.showSummary();
                    else UI.updateScoreBoard();
                });
            }
        };

        // ----------------------------------------------------
        // 最速でUIを起動するエントリーポイント
        // ----------------------------------------------------
        document.addEventListener('DOMContentLoaded', function() {
            try {
                UI.initPointsButtons();
                Events.init();
                // 通信環境に依存せず、この時点でアプリは操作可能になる
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 300);
                }
            } catch (err) {
                const errBox = document.getElementById('error-box');
                if(errBox) { errBox.classList.remove('hidden'); errBox.innerHTML += '【UI起動エラー】' + err.message + '<br>'; }
            }
        });
    </script>

    <!-- ==============================================================
         裏側で遅れて読み込むFirebaseシステム
         ============================================================== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script defer>
        const DB = {
            ref: null,
            init: function() {
                try {
                    if (typeof firebase === 'undefined') return;
                    const APP_ID = "soft-tennis-v1";
                    if (!firebase.apps.length) {
                        firebase.initializeApp({
                            apiKey: "AIzaSyCP4fUJBAKU7TaZ8jIRWxHzRMLLoE_T-wE",
                            authDomain: "softtennis-data.firebaseapp.com",
                            projectId: "softtennis-data"
                        });
                    }
                    const auth = firebase.auth();
                    const db = firebase.firestore();
                    DB.ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('matches');

                    auth.onAuthStateChanged(u => {
                        if (u) {
                            State.user = u;
                            document.getElementById('uid-display').textContent = u.uid.substring(0,8);
                            DB.ref.onSnapshot(snap => {
                                State.matches = snap.docs.map(doc => Object.assign({ id: doc.id }, doc.data())).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                                if(State.view === 'team') UI.renderTeam();
                                if(State.view === 'player') UI.renderPlayerSelect();
                            });
                        } else {
                            auth.signInAnonymously().catch(e => console.warn(e));
                        }
                    });
                } catch (e) {
                    console.error("DB Init Error:", e);
                }
            },
            saveMatch: function() {
                const finalData = { type: State.type, gc: State.gc, t: State.t, p1: State.p1, p2: State.p2, opp: State.opp, pts: State.pts, finalScore: State.sc, winner: State.sc.g1 > State.sc.g2 ? 1 : 2, createdAt: Date.now(), recorder: State.user ? State.user.uid : 'anon' };
                if (DB.ref) {
                    DB.ref.add(finalData).then(() => {
                        UI.resetToMeta();
                    }).catch(e => alert("保存失敗: " + e.message));
                } else {
                    alert("通信環境によりクラウド保存できませんでした。（記録はリセットされます）");
                    UI.resetToMeta();
                }
            },
            deleteMatch: function(id) {
                if (confirm('削除しますか？') && DB.ref) DB.ref.doc(id).delete();
            }
        };

        window.addEventListener('load', function() {
            setTimeout(function() {
                DB.init();
            }, 1000);
        });
    </script>
</body>
</html>
